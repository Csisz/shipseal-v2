name: ShipSeal Readiness CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  readiness:
    name: Delivery Pack export readiness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        # Accepted local validation command: npm run test
        run: npm test

      - name: Build app
        run: npm run build

      # Dogfooding safety coverage:
      # - Delivery Pack export paths must remain covered by tests.
      # - /api/github-archive must never execute imported repository code.
      # - ShipSeal readiness and AI Act notes are product guidance only.
      # - This is not legal advice.
