name: ShipSeal Readiness CI
# Generated by ShipSeal
# Review before enabling in production.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test

      - name: Run lint
        run: bun run lint

      - name: Run build
        run: bun run build