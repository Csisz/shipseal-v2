# ShipSeal Delivery Pack - 04-testing/CI_QUALITY_GATE.yml
# Project: Csisz/shipseal-v2
# Generated by ShipSeal.
# ShipSeal CI quality gate for Csisz/shipseal-v2
name: Quality Gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: bun install
      - run: bun lint || true
      - run: bun typecheck || true
      - run: bun test
      - run: bun build